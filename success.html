<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | MicroBurstMedia</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #3b82f6;
            --text-main: #f8fafc;
            --accent: #8b5cf6;
        }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container { 
            padding: 40px; 
            background: rgba(30, 41, 59, 0.6); 
            border-radius: 24px; 
            border: 1px solid var(--accent);
            max-width: 500px;
        }
        .icon-circle {
            width: 80px; height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { color: #94a3b8; line-height: 1.6; }
        .loader {
            margin: 20px auto;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-manual {
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-circle">✓</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for acquiring the <strong>AI Automation Setup Systems™ E-Book</strong>.</p>
    
    <div id="status-area">
        <div class="loader"></div>
        <p>Your download is starting automatically...</p>
    </div>

    <p style="font-size: 0.8rem; margin-top: 30px;">
        Redirecting you to the home page in <span id="timer">7</span> seconds.
    </p>
    
    <a href="https://drive.google.com/file/d/13hrWCkUDUIKjNpSZrUEEymGB7x-6lR5h/view?usp=sharing" class="btn-manual">Click here if download doesn't start</a>
</div>

<script>
    // 1. Trigger the Automatic Download
    window.onload = function() {
        const fileUrl = 'https://drive.google.com/file/d/13hrWCkUDUIKjNpSZrUEEymGB7x-6lR5h/view?usp=sharing'; // Paste your PDF link here
        const link = document.createElement('a');
        link.href = fileUrl;
        link.download = 'MicroBurstMedia_AI_Automation_Guide.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // 2. Countdown and Redirect
        let timeLeft = 7;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft -= 1;
            timerElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = 'https://microburstmedia.github.io/digital-marketing-network/';
            }
        }, 1000);
    };
</script>

</body>
</html>
