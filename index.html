<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your Guide | MBMN</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6; 
            --accent: #8b5cf6; 
            --text-main: #f8fafc;
            --success: #10b981;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .product-preview {
            width: 100%;
            max-width: 200px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            font-size: 1rem;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }

        #redirect-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: none; /* Hidden until download clicked */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #count { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 style="color: var(--success); margin-bottom: 15px;">Purchase Order Successful!</h2>
        
        <img src="https://i.pinimg.com/736x/1c/e8/50/1ce850cf15d9a1e7d87fd259f0b3373c.jpg" 
             alt="AI Automation Guide" 
             class="product-preview">

        <p style="margin-bottom: 25px; color: #94a3b8;">MicroBurstMedia wishes to thank you for purchasing the Beginners Guidebook on AI Automation. To access, please click on the "Download Guide" button.</p>
        
        <a href="https://drive.google.com/file/d/13hrWCkUDUIKjNpSZrUEEymGB7x-6lR5h/view?usp=sharing" 
           id="download-trigger" 
           class="btn" 
           download="AI_Automation_Setup_Systems.pdf">
            Download Guide
        </a>

        <div id="redirect-container">
            <p>Download started! Redirecting back to the Network in <span id="count">7</span>s...</p>
        </div>
    </div>

    <script>
        const downloadBtn = document.getElementById('download-trigger');
        const redirectBox = document.getElementById('redirect-container');
        const countDisplay = document.getElementById('count');
        const homeUrl = "https://microburstmedia.github.io/digital-marketing-network/";

        downloadBtn.onclick = function() {
            // 1. Show the redirect message
            redirectBox.style.display = 'block';
            
            // 2. Start the timer
            let timeLeft = 7;
            const timer = setInterval(() => {
                timeLeft--;
                countDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = homeUrl;
                }
            }, 1000);
        };
    </script>
</body>
</html>
